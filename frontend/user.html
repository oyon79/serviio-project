<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Your Account - SERVIIO</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/user.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="signup-container">
      <div class="header">
        <div class="logo">
          <img src="Image/logo 2.png" alt="SERVIIO Logo" />
          <span>SERVIIO</span>
        </div>
        <h1>Create Your Account</h1>
        <p class="join-text">Join Serviio as a Service User</p>

        <div class="social-auth">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-google"></i></a>
          <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>

        <div class="divider">
          <span>or register with email</span>
        </div>
      </div>

      <form class="signup-form" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" required />
        </div>

        <div class="form-group password-wrapper">
          <label for="password">Password</label>
          <input type="password" id="password" required />
          <i class="far fa-eye toggle-password"></i>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required />
        </div>

        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="terms" required />
            <label for="terms"
              >I agree to the Terms of Service and Privacy Policy</label
            >
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="updates" />
            <label for="updates"
              >Send me updates about new services and features</label
            >
          </div>
        </div>

        <button type="submit" class="submit-btn">
          COMPLETE YOUR REGISTRATION &rarr;
        </button>
      </form>

      <div class="footer-link">
        <a href="role.html">&larr; Go to Selection page</a>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault(); // Stop the default page refresh

          const firstName = document.getElementById("firstName").value.trim();
          const lastName = document.getElementById("lastName").value.trim();
          const email = document.getElementById("email").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // Password Validation
          if (password !== confirmPassword) {
            alert("Passwords do not match! Please try again.");
            return;
          }

          try {
            // Call the Node.js Backend API
            const response = await fetch(
              "http://localhost:5000/api/auth/register",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  first_name: firstName,
                  last_name: lastName,
                  email: email,
                  phone: phone,
                  password: password,
                  role: "customer", // Defaults to customer on this page
                }),
              },
            );

            const data = await response.json();

            if (data.success) {
              alert("Registration Successful! Redirecting to login...");
              window.location.href = "login.html"; // Route to login
            } else {
              alert("Registration failed: " + data.message); // e.g., Email already exists
            }
          } catch (error) {
            console.error("API Error:", error);
            alert(
              "Cannot connect to the server. Make sure your Node.js backend is running!",
            );
          }
        });
    </script>
  </body>
</html>
