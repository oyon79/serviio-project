<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - SERVIIO</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
      <script src="js/config.js"></script>
  </head>
  <body>
    <div class="background-overlay">
      <div class="login-container">
        <div class="login-form-section">
          <div class="header-row">
            <h1>Forgot Password</h1>
            <div class="logo-icon">
              <img
                src="Image/logo 2.png"
                alt="Logo"
                style="width: 40px; height: 40px; border-radius: 50%"
              />
            </div>
          </div>

          <p class="info-text">
            Enter the email address associated with your account. We will send
            a reset link and one-time code. If your account has a phone number
            on file, please enter it to verify your identity.
          </p>

          <form id="forgotPasswordForm">
            <div class="input-group">
              <label for="forgotEmail">Email Address</label>
              <input
                type="email"
                id="forgotEmail"
                placeholder="username@gmail.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="forgotPhone">Phone Number (optional)</label>
              <input type="tel" id="forgotPhone" placeholder="1234567890" />
            </div>

            <button type="submit" class="btn-signin" id="forgotSubmitButton">
              Send Reset Code
            </button>
            <div
              id="forgotMessage"
              class="login-message"
              aria-live="polite"
            ></div>
          </form>

          <p class="register-text">
            Remembered your password? <a href="login.html">Back to login</a>
          </p>
        </div>

        <div class="login-illustration-section">
          <img
            src="https://img.magnific.com/free-vector/forgot-password-concept_335657-3168.jpg?semt=ais_hybrid&w=740&q=80"
            alt="Forgot Password Illustration"
            class="main-illustration"
          />
        </div>
      </div>
    </div>

    <script src="js/forgotPassword.js"></script>
  </body>
</html>
