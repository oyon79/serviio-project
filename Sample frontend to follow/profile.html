                </div>
                <div class="form-group full-width">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" value="Mehrabbozorgi.business@gmail.com">
                        <i class="fa-solid fa-circle-check valid-icon"></i>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Address</label>
                    <input type="text" placeholder="Dhaka">
                </div>
                <div class="form-group full-width">
                    <label>Contact Number</label>
                    <input type="text" placeholder="58077.79">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <select><option>Mehrab</option></select>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <select><option>Dhaka</option></select>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" value="shdfbnd65sfdvb s">
                        <i class="fa-solid fa-circle-check valid-icon"></i>
                    </div>
                </div>
                <button type="submit" class="btn-save">Save</button>
