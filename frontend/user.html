<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERVIIO - Customer Registration</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/user.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
      <script src="js/config.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">SERVIIO</div>
      <ul class="nav-links">
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </nav>

    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Join as a Customer</h2>
          <p>Create an account to hire verified professionals.</p>
        </div>

        <form id="customerRegisterForm">
          <div style="display: flex; gap: 10px">
            <div class="form-group" style="flex: 1">
              <label for="first_name">First Name</label>
              <div class="input-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input
                  type="text"
                  id="first_name"
                  placeholder="John"
                  required
                />
              </div>
            </div>
            <div class="form-group" style="flex: 1">
              <label for="last_name">Last Name</label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="last_name"
                  placeholder="Doe"
                  required
                  style="padding-left: 15px"
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-wrapper">
              <i class="fas fa-phone input-icon"></i>
              <input type="tel" id="phone" placeholder="01XXXXXXXXX" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input
                type="email"
                id="email"
                placeholder="example@serviio.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
                <input
                  type="password"
                  id="password"
                  placeholder="At least 8 characters"
                  minlength="8"
                  required
                />
            </div>
          </div>

          <div
            id="errorBox"
            class="alert-box error"
            style="display: none"
          ></div>
          <div
            id="successBox"
            class="alert-box success"
            style="display: none"
          ></div>

          <button type="submit" class="btn-auth" id="registerSubmitBtn">
            Create Customer Account
          </button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign In here</a></p>
          <p style="margin-top: 10px">
            <a href="role.html">&larr; Back to Role Selection</a>
          </p>
        </div>
      </div>
    </main>

    <script>
      document
        .getElementById("customerRegisterForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errorBox = document.getElementById("errorBox");
          const successBox = document.getElementById("successBox");
          const submitBtn = document.getElementById("registerSubmitBtn");
          errorBox.style.display = "none";
          successBox.style.display = "none";

          const payload = {
            first_name: document.getElementById("first_name").value.trim(),
            last_name: document.getElementById("last_name").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            role: "customer", // Hardcoded role
          };

          if (payload.password.length < 8) {
            errorBox.textContent =
              "Password must be at least 8 characters long.";
            return (errorBox.style.display = "block");
          }

          // Strict phone validation (Bangladesh mobile numbers start with 01 and have 11 digits)
          const phoneRegex = /^01\d{9}$/;
          if (!phoneRegex.test(payload.phone)) {
            errorBox.textContent =
              "Please enter a valid Bangladeshi phone number (11 digits, starting with 01).";
            errorBox.style.display = "block";
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Creating Account...";

          try {
            const apiBase =
              window.getApiBaseUrl?.() || window.Serviio?.apiBaseUrl || window.location.origin;
            const response = await fetch(`${apiBase}/api/auth/register`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const data = await response.json();

            if (response.ok && data.success) {
              if (data.verification_required) {
                if (data.otp) {
                  sessionStorage.setItem(
                    `serviio_registration_otp_${payload.email.toLowerCase()}`,
                    data.otp,
                  );
                }
                successBox.textContent =
                  data.message || "Account created. Please verify your OTP.";
                successBox.style.display = "block";
                const target = `verify-registration.html?email=${encodeURIComponent(payload.email)}&role=customer`;
                setTimeout(() => (window.location.href = target), 900);
                return;
              }

              successBox.textContent =
                "Registration successful! Redirecting to login...";
              successBox.style.display = "block";
              setTimeout(() => (window.location.href = "login.html"), 2000);
            } else {
              errorBox.textContent = data.message || "Registration failed.";
              errorBox.style.display = "block";
              submitBtn.disabled = false;
              submitBtn.textContent = "Create Customer Account";
            }
          } catch (error) {
            errorBox.textContent = "Server error. Please try again later.";
            errorBox.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.textContent = "Create Customer Account";
          }
        });
    </script>
  </body>
</html>
