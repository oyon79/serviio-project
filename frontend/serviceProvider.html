<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERVIIO - Provider Registration</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/user.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">SERVIIO</div>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="login.html" class="active">Login / Register</a></li>
      </ul>
    </nav>

    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Join as a Service Provider</h2>
          <p>
            Register your skills and verify your identity to start getting jobs.
          </p>
        </div>

        <form id="providerRegisterForm">
          <div style="display: flex; gap: 10px">
            <div class="form-group" style="flex: 1">
              <label for="first_name">First Name (As per NID)</label>
              <div class="input-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="first_name" required />
              </div>
            </div>
            <div class="form-group" style="flex: 1">
              <label for="last_name">Last Name</label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="last_name"
                  required
                  style="padding-left: 15px"
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Business Phone</label>
            <div class="input-wrapper">
              <i class="fas fa-phone input-icon"></i>
              <input type="tel" id="phone" placeholder="01XXXXXXXXX" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Business Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="nid">Bangladesh National ID (NID)</label>
            <div class="input-wrapper">
              <i class="fas fa-id-card input-icon"></i>
              <input
                type="number"
                id="nid"
                placeholder="10, 13, or 17 digit NID"
                required
                autocomplete="off"
              />
            </div>
            <small
              style="
                color: #666;
                font-size: 0.8rem;
                display: block;
                margin-top: 5px;
              "
              >*Strictly required for platform security.</small
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                placeholder="At least 6 characters"
                required
              />
            </div>
          </div>

          <div
            id="errorBox"
            class="alert-box error"
            style="display: none"
          ></div>
          <div
            id="successBox"
            class="alert-box success"
            style="display: none"
          ></div>

          <button type="submit" class="btn-auth">Register & Verify NID</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign In here</a></p>
          <p style="margin-top: 10px">
            <a href="role.html">← Back to Role Selection</a>
          </p>
        </div>
      </div>
    </main>

    <script>
      document
        .getElementById("providerRegisterForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errorBox = document.getElementById("errorBox");
          const successBox = document.getElementById("successBox");
          errorBox.style.display = "none";

          const payload = {
            first_name: document.getElementById("first_name").value.trim(),
            last_name: document.getElementById("last_name").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            email: document.getElementById("email").value.trim(),
            nid: document.getElementById("nid").value.trim(),
            password: document.getElementById("password").value,
            role: "provider",
          };

          // STRICT NID VALIDATION
          const nidRegex = /^(?:\d{10}|\d{13}|\d{17})$/;
          if (!nidRegex.test(payload.nid)) {
            errorBox.textContent =
              "Security Error: Please enter a valid 10, 13, or 17-digit Bangladesh NID.";
            return (errorBox.style.display = "block");
          }

          if (payload.password.length < 6) {
            errorBox.textContent =
              "Password must be at least 6 characters long.";
            return (errorBox.style.display = "block");
          }

          // Strict phone validation (Bangladesh mobile numbers start with 01 and have 11 digits)
          const phoneRegex = /^01\d{9}$/;
          if (!phoneRegex.test(payload.phone)) {
            errorBox.textContent =
              "Please enter a valid Bangladeshi phone number (11 digits, starting with 01).";
            errorBox.style.display = "block";
            return;
          }

          try {
            // EXPLICIT ABSOLUTE URL TO FORCE CONNECTION TO BACKEND
            const response = await fetch(
              "http://localhost:5000/api/auth/register",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              },
            );

            const data = await response.json();

            if (response.ok || data.success) {
              successBox.textContent =
                "Verification pending. Account created! Redirecting...";
              successBox.style.display = "block";
              setTimeout(() => (window.location.href = "login.html"), 2500);
            } else {
              errorBox.textContent = data.message || "Registration failed.";
              errorBox.style.display = "block";
            }
          } catch (error) {
            console.error("Fetch error:", error); // Logs exact error to browser console
            errorBox.textContent =
              "Server connection failed. Ensure backend is running on port 5000.";
            errorBox.style.display = "block";
          }
        });
    </script>
  </body>
</html>
