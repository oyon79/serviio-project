<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SERVIIO</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="background-overlay">
      <div class="login-container">
        <div class="login-form-section">
          <div class="header-row">
            <h1>Login</h1>
            <div class="logo-icon">
              <img
                src="Image/logo 2.png"
                alt="Logo"
                style="width: 40px; height: 40px; border-radius: 50%"
              />
            </div>
          </div>

          <form id="loginForm">
            <div class="input-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="username@gmail.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                  required
                />
                <i class="far fa-eye-slash toggle-password"></i>
              </div>
            </div>

            <div class="forgot-link">
              <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-signin">Sign In &rarr;</button>
          </form>

          <div class="divider">
            <span>Or Continue With</span>
          </div>

          <!-- Social login removed (not implemented) -->

          <p class="register-text">
            Don't have an account yet? <a href="role.html">Register for free</a>
          </p>
        </div>

        <div class="login-illustration-section">
          <img
            src="https://img.magnific.com/free-vector/access-control-system-abstract-concept_335657-3180.jpg?semt=ais_hybrid&w=740&q=80"
            alt="Worker Illustration"
            class="main-illustration"
          />
        </div>
      </div>
    </div>

    <script>
      // Single login handler: standardizes token storage and redirects
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          try {
            const response = await fetch(
              "http://localhost:5000/api/auth/login",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              },
            );

            const data = await response.json();

            if (response.ok && data.success) {
              // Use consistent keys across the frontend
              localStorage.setItem("serviio_token", data.token);
              localStorage.setItem("serviio_user", JSON.stringify(data.user));

              // Redirect based on role
              const role = ((data.user && data.user.role) || "").toLowerCase();
              if (role === "provider") {
                window.location.href = "profileBooking.html";
              } else if (role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "home.html";
              }
            } else {
              alert(
                data.message || "Login failed. Please check your credentials.",
              );
            }
          } catch (err) {
            console.error("Login error:", err);
            alert(
              "Cannot reach server. Make sure backend is running on port 5000.",
            );
          }
        });
    </script>
  </body>
</html>
