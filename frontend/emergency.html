<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERVIIO - Urgent Emergency SOS</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/emergency.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
      <script src="js/config.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">SERVIIO</div>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="emergency.html" class="active">SOS Help</a></li>
      </ul>
    </nav>

    <main class="emergency-wrapper">
      <div class="sos-card">
        <div class="pulse-ring">
          <i class="fas fa-exclamation-triangle panic-icon"></i>
        </div>
        <h2>Emergency Support Fallback</h2>
        <p>
          No verified professional responded to your immediate service handshake
          request? Initiate fallback sequence to transmit task logs into
          regional community support channels.
        </p>
        <button class="btn-panic-trigger" onclick="activatePanicFallback()">
          Broadcast to Facebook Assist
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 SERVIIO. All Rights Reserved.</p>
    </footer>

    <script>
      function getCurrentPositionSafe() {
        return new Promise((resolve) => {
          if (!navigator.geolocation) {
            resolve(null);
            return;
          }
          navigator.geolocation.getCurrentPosition(
            (position) => resolve(position),
            () => resolve(null),
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 30000 },
          );
        });
      }

      async function activatePanicFallback() {
        const token = localStorage.getItem("serviio_token");
        const position = await getCurrentPositionSafe();

        const payload = {
          emergency_type: "SOS",
          message: "Emergency request from user",
          location: position ? "GPS captured from browser" : "Unknown",
          latitude: position ? position.coords.latitude : undefined,
          longitude: position ? position.coords.longitude : undefined,
        };

        try {
          const headers = {
            "Content-Type": "application/json",
          };
          if (token) {
            headers.Authorization = `Bearer ${token}`;
          }

          const resp = await fetch(Serviio.apiUrl("/api/emergency"), {
            method: "POST",
            headers,
            body: JSON.stringify(payload),
          });

          const data = await resp.json();
          if (resp.ok && data.communityLink) {
            Serviio.notify(
              "SOS Fallback Initialized. Redirecting to community support.",
              "success",
            );
            window.location.href = data.communityLink;
          } else {
            Serviio.notify(
              "SOS: Could not reach community service. Redirecting to Facebook fallback.",
              "warning",
            );
            window.location.href = "https://facebook.com";
          }
        } catch (err) {
          console.error(err);
          Serviio.notify("Network error. Redirecting to Facebook fallback.", "error");
          window.location.href = "https://facebook.com";
        }
      }
    </script>
  </body>
</html>
