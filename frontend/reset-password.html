<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SERVIIO</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
      <script src="js/config.js"></script>
  </head>
  <body>
    <div class="background-overlay">
      <div class="login-container">
        <div class="login-form-section">
          <div class="header-row">
            <h1>Reset Password</h1>
            <div class="logo-icon">
              <img
                src="Image/logo 2.png"
                alt="Logo"
                style="width: 40px; height: 40px; border-radius: 50%"
              />
            </div>
          </div>

          <p class="info-text" id="resetHint">
            Use the form below to create a strong new password for your account.
          </p>

          <form id="resetPasswordForm">
            <div class="input-group">
              <label for="resetOtp">One-Time Code</label>
              <input
                type="text"
                id="resetOtp"
                placeholder="Enter the 6-digit code"
                inputmode="numeric"
                maxlength="6"
                required
              />
            </div>

            <div class="input-group">
              <label for="newPassword">New Password</label>
              <input
                type="password"
                id="newPassword"
                placeholder="Enter your new password"
                required
              />
            </div>

            <div class="input-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                placeholder="Repeat your new password"
                required
              />
            </div>

            <button type="submit" class="btn-signin" id="resetSubmitButton">
              Reset Password
            </button>
            <div
              id="resetMessage"
              class="login-message"
              aria-live="polite"
            ></div>
          </form>

          <p class="register-text">
            Already have your password? <a href="login.html">Back to login</a>
          </p>
        </div>

        <div class="login-illustration-section">
          <img
            src="https://img.magnific.com/free-vector/security-checklist-concept_335657-3228.jpg?semt=ais_hybrid&w=740&q=80"
            alt="Security Illustration"
            class="main-illustration"
          />
        </div>
      </div>
    </div>

    <script src="js/resetPassword.js"></script>
  </body>
</html>
